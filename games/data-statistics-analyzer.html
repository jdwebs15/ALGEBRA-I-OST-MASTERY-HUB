<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Data & Statistics Analyzer — Algebra I OST Mastery Hub</title>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body>
  <div class="wrap" id="app"></div>

<script>
function shuffle(arr){
  const a = [...arr];
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function formatTime(s){
  const m = Math.floor(s / 60).toString().padStart(2,'0');
  const sec = (s % 60).toString().padStart(2,'0');
  return `${m}:${sec}`;
}

function startTimer(el){
  let sec = 0;
  el.textContent = '00:00';
  return setInterval(() => {
    sec++;
    el.textContent = formatTime(sec);
  }, 1000);
}

function calcAccuracy(correct,total){
  return total ? Math.round((correct / total) * 100) : 0;
}

function buildHeader(title, sub){
  return `
    <div class="panel header">
      <div class="brand">
        <div class="brand-badge">📉</div>
        <div>
          <h1>${title}</h1>
          <div class="sub">${sub}</div>
        </div>
      </div>
      <div class="statusbar">
        <div class="pill">Student: <span id="studentNameOut">Guest</span></div>
        <div class="pill">Progress: <span id="progressOut">0/0</span></div>
        <div class="pill">Accuracy: <span id="accuracyOut">0%</span></div>
        <div class="pill">Timer: <span id="timerOut">00:00</span></div>
        <div class="pill">Started: <span id="startedOut">—</span></div>
      </div>
    </div>
  `;
}

function todayStamp(){
  return new Date().toLocaleString();
}

const questionBank = [
  {type:'mc', prompt:'What is the mean of 4, 6, 8, 10?', choices:['7','6','8','9'], answer:0, hint:'Add the numbers and divide by 4.', explanation:'(4 + 6 + 8 + 10) ÷ 4 = 7.'},
  {type:'mc', prompt:'What is the median of 3, 5, 7, 9, 11?', choices:['7','5','8','9'], answer:0, hint:'The median is the middle value in an ordered list.', explanation:'The middle value is 7.'},
  {type:'mc', prompt:'What is the range of 2, 5, 8, 10?', choices:['8','10','6','12'], answer:0, hint:'Subtract the smallest value from the largest.', explanation:'10 - 2 = 8.'},
  {type:'mc', prompt:'What is the mode of 2, 3, 3, 4, 5?', choices:['3','4','2','5'], answer:0, hint:'The mode is the value that appears most often.', explanation:'3 appears most often.'},
  {type:'mc', prompt:'What is the mean of 5, 5, 7, 9?', choices:['6.5','6','7','6.25'], answer:0, hint:'Add the values and divide by 4.', explanation:'(5 + 5 + 7 + 9) ÷ 4 = 26 ÷ 4 = 6.5.'},
  {type:'mc', prompt:'Which measure of center is most affected by an outlier?', choices:['Mean','Median','Mode','Range'], answer:0, hint:'Think about which value uses every number in the set.', explanation:'The mean uses all values, so it is most affected by outliers.'},
  {type:'mc', prompt:'What is the median of 2, 4, 6, 8?', choices:['5','6','4','8'], answer:0, hint:'For an even number of values, average the two middle numbers.', explanation:'(4 + 6) ÷ 2 = 5.'},
  {type:'mc', prompt:'What is the range of 12, 15, 19, 25?', choices:['13','10','15','7'], answer:0, hint:'Largest minus smallest.', explanation:'25 - 12 = 13.'},
  {type:'mc', prompt:'Which data set has a mode of 6?', choices:['4, 6, 6, 8, 10','4, 5, 6, 7, 8','6, 7, 7, 8, 8','5, 5, 6, 6, 7'], answer:0, hint:'Look for the set where 6 appears more than any other value.', explanation:'Only the first set has 6 as the single most frequent value.'},
  {type:'mc', prompt:'What is the mean of 10, 20, 30?', choices:['20','15','25','30'], answer:0, hint:'Add and divide by 3.', explanation:'(10 + 20 + 30) ÷ 3 = 60 ÷ 3 = 20.'},
  {type:'mc', prompt:'If a data set has one very large outlier, which measure is usually best for center?', choices:['Median','Mean','Mode','Range'], answer:0, hint:'Choose the measure least influenced by extreme values.', explanation:'The median is less affected by outliers.'},
  {type:'mc', prompt:'A set of scores is 6, 8, 10, 12. What is the mean?', choices:['9','8','10','12'], answer:0, hint:'Add all scores and divide by 4.', explanation:'(6 + 8 + 10 + 12) ÷ 4 = 36 ÷ 4 = 9.'},
  {type:'mc', prompt:'What is the median of 1, 2, 2, 4, 9?', choices:['2','1','4','3'], answer:0, hint:'Identify the middle number.', explanation:'The middle value is 2.'},
  {type:'mc', prompt:'What is the range of 14, 14, 14, 20?', choices:['6','20','14','0'], answer:0, hint:'Subtract the smallest value from the largest.', explanation:'20 - 14 = 6.'},
  {type:'mc', prompt:'Which statement is true about the mean and median?', choices:['They can be different','They are always the same','The mean is always larger','The median is always a decimal'], answer:0, hint:'Different data shapes can change the values.', explanation:'The mean and median can be different.'},
  {type:'mc', prompt:'What is the mode of 4, 4, 6, 6, 8?', choices:['There is no single mode','4','6','8'], answer:0, hint:'Check whether more than one value appears most often.', explanation:'Both 4 and 6 appear twice, so there is no single mode.'},
  {type:'mc', prompt:'If points on a scatterplot rise from left to right, what type of association is shown?', choices:['Positive association','Negative association','No association','Zero association'], answer:0, hint:'As x increases, y also increases.', explanation:'That pattern shows a positive association.'},
  {type:'mc', prompt:'If points on a scatterplot fall from left to right, what type of association is shown?', choices:['Negative association','Positive association','No association','Constant association'], answer:0, hint:'As x increases, y decreases.', explanation:'That pattern shows a negative association.'},
  {type:'mc', prompt:'If a scatterplot has no clear trend, what type of association is shown?', choices:['No clear association','Positive association','Negative association','Perfect association'], answer:0, hint:'The points do not rise or fall together consistently.', explanation:'That means there is no clear association.'},
  {type:'mc', prompt:'What is the mean of 2, 6, 10, 14?', choices:['8','6','10','7'], answer:0, hint:'Add the numbers and divide by 4.', explanation:'(2 + 6 + 10 + 14) ÷ 4 = 32 ÷ 4 = 8.'},
  {type:'mc', prompt:'A set of visitors is 12, 16, 18, 14. What is the range?', choices:['6','4','18','2'], answer:0, hint:'Largest minus smallest.', explanation:'18 - 12 = 6.'},
  {type:'mc', prompt:'A data set is 3, 4, 5, 6, 30. Which measure best describes the center?', choices:['Median','Mean','Mode','Range'], answer:0, hint:'Choose the measure that resists the outlier 30.', explanation:'The median is best because 30 is an outlier.'},
  {type:'mc', prompt:'What is the median of 5, 8, 8, 9, 12, 14?', choices:['8.5','8','9','10'], answer:0, hint:'Average the two middle values.', explanation:'(8 + 9) ÷ 2 = 8.5.'},
  {type:'mc', prompt:'If two data sets have the same mean, what can still be different?', choices:['Their spread','Their total number of values must be the same','Their median must be the same','Their values must be identical'], answer:0, hint:'Center and spread are not the same idea.', explanation:'Two sets can have the same mean but different spread.'},
  {type:'mc', prompt:'What is the range of 1, 3, 7, 9, 10?', choices:['9','10','7','8'], answer:0, hint:'Subtract the smallest value from the largest.', explanation:'10 - 1 = 9.'},
  {type:'mc', prompt:'Which value is most likely an outlier in 5, 6, 6, 7, 8, 30?', choices:['30','8','7','6'], answer:0, hint:'Look for the value far away from the rest.', explanation:'30 is much larger than the others, so it is the outlier.'},
  {type:'mc', prompt:'If x-values and y-values both increase together in a table, what kind of association is suggested?', choices:['Positive','Negative','None','Impossible to determine'], answer:0, hint:'As one variable increases, the other does too.', explanation:'That suggests a positive association.'},
  {type:'mc', prompt:'What is the mean of 9, 11, 13, 15, 17?', choices:['13','12','14','15'], answer:0, hint:'Add the numbers and divide by 5.', explanation:'(9 + 11 + 13 + 15 + 17) ÷ 5 = 65 ÷ 5 = 13.'},
  {type:'mc', prompt:'What is the median of 4, 4, 5, 9, 10?', choices:['5','4','6','9'], answer:0, hint:'The median is the middle value.', explanation:'The middle value is 5.'},
  {type:'mc', prompt:'Which measure of spread is found by subtracting the smallest value from the largest value?', choices:['Range','Mean','Median','Mode'], answer:0, hint:'This measure tells how wide the data set is.', explanation:'The range is maximum minus minimum.'}
];

const questions = shuffle(questionBank).slice(0, Math.min(30, questionBank.length));
let index = 0;
let correct = 0;
let attempts = 0;
let timerId = null;
let gameStarted = false;

const app = document.getElementById('app');

app.innerHTML = `
  ${buildHeader('Data & Statistics Analyzer','OST-style center, spread, outliers, and association')}
  <div class="grid grid-2">
    <div class="panel side">
      <h3>Start</h3>
      <p class="muted">This build focuses on mean, median, mode, range, outliers, and interpreting associations in tables and scatterplots.</p>
      <div class="tools">
        <label class="small">Student name<br><input id="studentName" class="answer-box" style="min-height:44px" placeholder="Enter student name" /></label>
        <button class="btn" id="beginBtn">Begin Data & Statistics Analyzer</button>
        <a class="btn secondary center" href="../index.html">Back to Hub</a>
      </div>
      <div style="margin-top:18px">
        <div class="small muted">Progress</div>
        <div class="progress"><span id="progressBar"></span></div>
      </div>
      <div class="footer-controls">
        <button class="btn secondary" id="restartBtn" disabled>Restart</button>
      </div>
      <div class="notice" style="margin-top:16px">Hints guide students without giving the final answer. Correct answers auto-advance after the explanation lingers briefly.</div>
    </div>
    <div class="panel question" id="stage">
      <div class="center muted" style="padding:28px 12px">Press <strong>Begin</strong> to start.</div>
    </div>
  </div>
`;

document.getElementById('beginBtn').onclick = startGame;
document.getElementById('restartBtn').onclick = () => location.reload();

function startGame(){
  if(gameStarted) return;
  gameStarted = true;

  document.getElementById('studentNameOut').textContent =
    document.getElementById('studentName').value.trim() || 'Guest';
  document.getElementById('startedOut').textContent = todayStamp();
  document.getElementById('restartBtn').disabled = false;

  if(timerId) clearInterval(timerId);
  timerId = startTimer(document.getElementById('timerOut'));

  renderQuestion();
}

function renderQuestion(){
  const q = questions[index];

  if(!q){
    clearInterval(timerId);
    const stage = document.getElementById('stage');
    stage.innerHTML = `
      <div class="center" style="padding:30px 12px">
        <div class="qnum" style="margin:0 auto 12px;background:var(--good)">✓</div>
        <h2>Round Complete</h2>
        <p class="muted">Final accuracy: <strong>${calcAccuracy(correct,attempts)}%</strong> • Correct: <strong>${correct}</strong> / ${questions.length}</p>
        <div class="footer-controls" style="justify-content:center">
          <button class="btn" onclick="location.reload()">Play Again</button>
          <a class="btn secondary" href="../index.html">Back to Hub</a>
        </div>
      </div>
    `;
    document.getElementById('progressOut').textContent = `${questions.length}/${questions.length}`;
    document.getElementById('accuracyOut').textContent = `${calcAccuracy(correct,attempts)}%`;
    document.getElementById('progressBar').style.width = '100%';
    return;
  }

  document.getElementById('progressOut').textContent = `${index + 1}/${questions.length}`;
  document.getElementById('accuracyOut').textContent = `${calcAccuracy(correct,attempts)}%`;
  document.getElementById('progressBar').style.width = `${(index / questions.length) * 100}%`;

  const labels = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
  const items = q.choices.map((c,i) => ({ text:c, idx:i }));
  q.renderChoices = shuffle(items);

  document.getElementById('stage').innerHTML = `
    <div class="q-meta">
      <div class="flex">
        <div class="qnum">${index + 1}</div>
        <div>
          <div class="small muted">Data & Statistics Analyzer</div>
          <div class="small">Question ${index + 1} of ${questions.length}</div>
        </div>
      </div>
      <a class="btn secondary" href="../index.html">Exit</a>
    </div>

    <div class="prompt">${q.prompt}</div>

    <div class="choices">
      ${q.renderChoices.map((c,i) => `
        <label class="choice">
          <input type="radio" name="choice" value="${c.idx}">
          <span class="choice-label">${labels[i]}</span>
          <span>${c.text}</span>
        </label>
      `).join('')}
    </div>

    <div class="footer-controls">
      <button class="btn" id="submitBtn">Check Answer</button>
    </div>

    <div class="feedback" id="feedback"></div>
  `;

  document.getElementById('submitBtn').onclick = checkAnswer;
}

function showFeedback(type, text){
  const fb = document.getElementById('feedback');
  fb.className = `feedback show ${type}`;
  fb.innerHTML = text;
}

function lockQuestionInputs(){
  document.querySelectorAll('input, select, button.kbtn').forEach(el => {
    el.disabled = true;
  });
  const submitBtn = document.getElementById('submitBtn');
  if(submitBtn) submitBtn.disabled = true;
}

function markChoicesMC(answerIdx){
  document.querySelectorAll('.choice').forEach(label => {
    const input = label.querySelector('input');
    if(Number(input.value) === answerIdx){
      label.classList.add('correct');
    } else if(input.checked){
      label.classList.add('incorrect');
    }
  });
}

function checkAnswer(){
  const q = questions[index];
  attempts++;

  const picked = document.querySelector('input[name="choice"]:checked');
  if(!picked) return showFeedback('bad','Select one answer first.');

  const ok = Number(picked.value) === q.answer;
  markChoicesMC(q.answer);

  document.getElementById('accuracyOut').textContent = `${calcAccuracy(correct,attempts)}%`;

  if(ok){
    correct++;
    document.getElementById('accuracyOut').textContent = `${calcAccuracy(correct,attempts)}%`;
    showFeedback('good', `<strong>Correct.</strong> ${q.explanation}`);
    lockQuestionInputs();
    setTimeout(() => {
      index++;
      renderQuestion();
    }, 1900);
  } else {
    showFeedback('bad', `<strong>Not yet.</strong> Hint: ${q.hint}<br><span class="muted">Revise your answer and try again.</span>`);
  }
}
</script>
</body>
</html>
