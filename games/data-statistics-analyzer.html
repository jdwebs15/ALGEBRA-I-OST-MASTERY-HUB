function shuffle(a){
  const arr=[...a];
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function norm(s){
  return String(s).replace(/\s+/g,'').toLowerCase();
}

function mean(arr){
  return arr.reduce((a,b)=>a+b,0)/arr.length;
}

function median(arr){
  const s=[...arr].sort((a,b)=>a-b);
  const mid=Math.floor(s.length/2);
  return s.length%2 ? s[mid] : (s[mid-1]+s[mid])/2;
}

function rangeOf(arr){
  const s=[...arr].sort((a,b)=>a-b);
  return s[s.length-1]-s[0];
}

function modeOf(arr){
  const counts={};
  let best=null, bestCount=0;
  arr.forEach(v=>{
    counts[v]=(counts[v]||0)+1;
    if(counts[v]>bestCount){
      best=v;
      bestCount=counts[v];
    }
  });
  const freq=Object.values(counts).filter(c=>c===bestCount).length;
  if(bestCount===1 || freq>1) return 'none';
  return String(best);
}

function createCalc(inputRef){
  const wrap=document.createElement('div');
  const keys=['7','8','9','4','5','6','1','2','3','0','.','⌫','clear'];

  keys.forEach(k=>{
    const b=document.createElement('button');
    b.textContent=k;
    b.className='kbtn';
    b.onclick=()=>{
      const el=inputRef();
      if(!el)return;

      if(k==='⌫'){el.value=el.value.slice(0,-1);return;}
      if(k==='clear'){el.value='';return;}
      el.value+=k;
    };
    wrap.appendChild(b);
  });

  return wrap;
}

function tableHtml(headers, rows){
  return `
    <div class="table-box">
      <table style="width:100%;border-collapse:collapse;background:#fff;color:#111;border-radius:12px;overflow:hidden">
        <thead>
          <tr>
            ${headers.map(h => `<th style="border:1px solid #d7e0f0;padding:10px;background:#eef3fb">${h}</th>`).join('')}
          </tr>
        </thead>
        <tbody>
          ${rows.map(r => `
            <tr>
              ${r.map(c => `<td style="border:1px solid #d7e0f0;padding:10px;text-align:center">${c}</td>`).join('')}
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function scatterSvg(points){
  const w=300, h=220, pad=28;
  const maxX=10, maxY=10;

  let svg=`<div class="graph-box"><svg viewBox="0 0 ${w} ${h}">`;
  svg+=`<rect x="0" y="0" width="${w}" height="${h}" fill="white"/>`;

  for(let i=0;i<=10;i++){
    const x=pad + i*((w-2*pad)/10);
    const y=pad + i*((h-2*pad)/10);
    svg+=`<line x1="${x}" y1="${pad}" x2="${x}" y2="${h-pad}" stroke="#e8eef8"/>`;
    svg+=`<line x1="${pad}" y1="${y}" x2="${w-pad}" y2="${y}" stroke="#e8eef8"/>`;
  }

  svg+=`<line x1="${pad}" y1="${h-pad}" x2="${w-pad}" y2="${h-pad}" stroke="#111" stroke-width="2"/>`;
  svg+=`<line x1="${pad}" y1="${pad}" x2="${pad}" y2="${h-pad}" stroke="#111" stroke-width="2"/>`;

  for(let i=0;i<=10;i++){
    const x=pad + i*((w-2*pad)/10);
    const y=h-pad - i*((h-2*pad)/10);
    if(i<10){
      svg+=`<text x="${x-3}" y="${h-pad+15}" font-size="10" fill="#334">${i}</text>`;
      svg+=`<text x="${pad-16}" y="${y+4}" font-size="10" fill="#334">${i}</text>`;
    }
  }

  points.forEach(([x,y])=>{
    const px=pad + x*((w-2*pad)/10);
    const py=h-pad - y*((h-2*pad)/10);
    svg+=`<circle cx="${px}" cy="${py}" r="4.5" fill="#d43f3a"/>`;
  });

  svg+=`</svg></div>`;
  return svg;
}

const questions = shuffle(bank).slice(0,30);
let i=0, correct=0, attempts=0, activeInput=null;

const app=document.getElementById('app');

function render(){
  const q=questions[i];

  if(!q){
    app.innerHTML=`<div class="panel"><h2>Complete!</h2>
    <p>Accuracy: ${Math.round(correct/attempts*100)}%</p></div>`;
    return;
  }

  let html=`<div class="panel">
  <h2>Question ${i+1}/30</h2>`;

  if(q.table){
    html+=tableHtml(q.table.headers, q.table.rows);
  }

  html+=`<div class="prompt">${q.q}</div>`;

  if(q.type==='mc' || q.type==='tablemc'){
    const choices=shuffle(q.choices.map((c,idx)=>({c,idx})));
    q._choices=choices;

    html+=choices.map(c=>`
    <label class="choice">
      <input type="radio" name="c" value="${c.idx}">
      ${c.c}
    </label>`).join('');

    html+=`<div class="footer-controls"><button class="btn" id="submit">Submit</button></div>`;
  }

  if(q.type==='input'){
    html+=`
      <div class="answer-row"><input id="input" class="answer-box"></div>
      <div id="calc"></div>
      <div class="footer-controls"><button class="btn" id="submit">Submit</button></div>`;
  }

  html+=`<div id="feedback" class="feedback" style="display:block"></div></div>`;
  app.innerHTML=html;

  if(q.type==='input'){
    activeInput=document.getElementById('input');
    document.getElementById('calc').appendChild(createCalc(()=>activeInput));
  }

  document.getElementById('submit').onclick=check;
}

function check(){
  const q=questions[i];
  attempts++;
  let ok=false;

  if(q.type==='mc' || q.type==='tablemc'){
    const sel=document.querySelector('input[name="c"]:checked');
    if(!sel) return;
    ok=Number(sel.value)===q.a;
  }

  if(q.type==='input'){
    ok=q.a.some(a=>norm(a)===norm(activeInput.value));
  }

  const fb=document.getElementById('feedback');

  if(ok){
    correct++;
    fb.innerHTML="Correct! " + q.exp;
    fb.className='feedback show good';
    setTimeout(()=>{i++;render();},1500);
  }else{
    fb.innerHTML="Try again: " + q.exp;
    fb.className='feedback show bad';
  }
}
