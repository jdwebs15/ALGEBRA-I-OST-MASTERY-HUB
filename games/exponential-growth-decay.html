<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Exponential Growth & Decay — OST Mastery</title>
<link rel="stylesheet" href="../styles.css">
</head>
<body>

<div class="wrap">

<!-- START SCREEN -->
<div id="startScreen" class="panel">
  <h2>Exponential Growth & Decay</h2>
  <p>Enter your name to begin</p>
  <input id="studentName" class="answer-box" placeholder="Your name">
  <br><br>
  <button class="btn" onclick="startGame()">Start</button>
</div>

<!-- GAME -->
<div id="gameScreen" style="display:none">

  <!-- HEADER -->
  <div class="panel hud">
    <div><b id="nameDisplay"></b></div>
    <div>Q: <span id="progress">1/30</span></div>
    <div>Score: <span id="accuracy">0%</span></div>
    <div>Time: <span id="timer">0:00</span></div>
    <div>Started: <span id="startTime"></span></div>
  </div>

  <!-- QUESTION -->
  <div class="panel">
    <div id="questionText"></div>
    <div id="choices"></div>
    <button class="btn" onclick="submitAnswer()">Submit</button>
    <div id="feedback"></div>
  </div>

</div>

</div>

<script>
// ---------- UTIL ----------
function shuffle(a){
  const arr=[...a];
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

// ---------- TIMER ----------
let seconds=0;
let timerInterval;

function startTimer(){
  timerInterval=setInterval(()=>{
    seconds++;
    const m=Math.floor(seconds/60);
    const s=seconds%60;
    document.getElementById('timer').textContent =
      m+":"+(s<10?"0":"")+s;
  },1000);
}

// ---------- QUESTIONS (30) ----------
const bank = [

{q:"Evaluate: 2³", choices:["8","6","9","4"], a:0, hint:"Multiply 2×2×2", exp:"2×2×2 = 8"},
{q:"Evaluate: 5²", choices:["25","10","20","15"], a:0, hint:"Square means multiply twice", exp:"5×5 = 25"},
{q:"Evaluate: 3⁴", choices:["81","27","64","12"], a:0, hint:"Multiply 3 four times", exp:"3×3×3×3 = 81"},
{q:"Evaluate: 10³", choices:["1000","100","30","300"], a:0, hint:"10×10×10", exp:"=1000"},
{q:"Which is exponential growth?", choices:["y=2(1.5)^x","y=2(0.5)^x","y=2x+3","y=x²"], a:0, hint:"Growth has base >1", exp:"1.5 > 1 so growth"},
{q:"Which is decay?", choices:["y=3(0.5)^x","y=3(2)^x","y=3x","y=x²"], a:0, hint:"Decay base <1", exp:"0.5 < 1"},
{q:"Evaluate: 4²", choices:["16","8","12","6"], a:0, hint:"Square it", exp:"4×4=16"},
{q:"Evaluate: 2⁵", choices:["32","16","64","10"], a:0, hint:"Multiply 2 five times", exp:"32"},
{q:"Evaluate: 3³", choices:["27","9","18","6"], a:0, hint:"3×3×3", exp:"27"},
{q:"Which grows faster?", choices:["y=2^x","y=1.1^x","y=x","y=x²"], a:0, hint:"Larger base grows faster", exp:"2^x grows faster"},
{q:"Evaluate: 6²", choices:["36","12","18","30"], a:0, hint:"6×6", exp:"36"},
{q:"Evaluate: 7²", choices:["49","14","21","35"], a:0, hint:"7×7", exp:"49"},
{q:"Evaluate: 2⁴", choices:["16","8","12","10"], a:0, hint:"2×2×2×2", exp:"16"},
{q:"Which is decay?", choices:["(0.8)^x","(2)^x","x²","x+3"], a:0, hint:"Base <1", exp:"0.8 is decay"},
{q:"Evaluate: 9²", choices:["81","18","27","72"], a:0, hint:"9×9", exp:"81"},
{q:"Evaluate: 8²", choices:["64","16","32","48"], a:0, hint:"8×8", exp:"64"},
{q:"Evaluate: 2⁶", choices:["64","32","128","16"], a:0, hint:"2×2×2×2×2×2", exp:"64"},
{q:"Evaluate: 3²", choices:["9","6","12","3"], a:0, hint:"3×3", exp:"9"},
{q:"Which grows faster?", choices:["3^x","2^x","x²","x"], a:0, hint:"Larger base", exp:"3^x"},
{q:"Evaluate: 5³", choices:["125","25","50","75"], a:0, hint:"5×5×5", exp:"125"},
{q:"Evaluate: 10²", choices:["100","20","200","10"], a:0, hint:"10×10", exp:"100"},
{q:"Evaluate: 2³", choices:["8","6","4","2"], a:0, hint:"Multiply 3 times", exp:"8"},
{q:"Which is growth?", choices:["(1.2)^x","(0.9)^x","x²","x"], a:0, hint:"Base >1", exp:"1.2 growth"},
{q:"Evaluate: 4³", choices:["64","16","12","48"], a:0, hint:"4×4×4", exp:"64"},
{q:"Evaluate: 6³", choices:["216","36","108","72"], a:0, hint:"6×6×6", exp:"216"},
{q:"Evaluate: 3⁵", choices:["243","81","125","60"], a:0, hint:"Multiply 5 times", exp:"243"},
{q:"Evaluate: 2⁷", choices:["128","64","256","32"], a:0, hint:"Double repeatedly", exp:"128"},
{q:"Which decays fastest?", choices:["(0.2)^x","(0.8)^x","(1.2)^x","x²"], a:0, hint:"Smaller base decays faster", exp:"0.2"},
{q:"Evaluate: 7³", choices:["343","49","21","147"], a:0, hint:"7×7×7", exp:"343"},
{q:"Evaluate: 9³", choices:["729","81","243","90"], a:0, hint:"Multiply 9 three times", exp:"729"}

];

// ---------- GAME STATE ----------
let questions = shuffle(bank);
let current=0;
let correct=0;
let attempts=0;
let selected=null;

// ---------- START ----------
function startGame(){
  const name=document.getElementById('studentName').value.trim();
  if(!name) return;

  document.getElementById('startScreen').style.display='none';
  document.getElementById('gameScreen').style.display='block';

  document.getElementById('nameDisplay').textContent=name;
  document.getElementById('startTime').textContent=new Date().toLocaleTimeString();

  startTimer();
  loadQuestion();
}

// ---------- LOAD ----------
function loadQuestion(){
  selected=null;

  const q=questions[current];
  document.getElementById('questionText').innerHTML=q.q;

  const shuffled = shuffle(q.choices.map((c,i)=>({c,i})));
  q._map = shuffled;

  document.getElementById('choices').innerHTML = shuffled.map(c=>`
    <label class="choice">
      <input type="radio" name="c" value="${c.i}">
      ${c.c}
    </label>
  `).join('');

  document.getElementById('progress').textContent = (current+1)+"/30";
  document.getElementById('accuracy').textContent =
    attempts ? Math.round((correct/attempts)*100)+"%" : "0%";

  document.getElementById('feedback').innerHTML="";
}

// ---------- SUBMIT ----------
function submitAnswer(){
  const q=questions[current];
  const sel=document.querySelector('input[name="c"]:checked');
  if(!sel) return;

  attempts++;

  const isCorrect = Number(sel.value)===q.a;
  const fb=document.getElementById('feedback');

  if(isCorrect){
    correct++;
    fb.innerHTML = `<span class="good">Correct!</span> ${q.exp}`;

    setTimeout(()=>{
      current++;
      if(current>=30){
        endGame();
      }else{
        loadQuestion();
      }
    },1800);

  }else{
    fb.innerHTML = `<span class="bad">Try again:</span> ${q.hint}`;
  }
}

// ---------- END ----------
function endGame(){
  clearInterval(timerInterval);

  document.getElementById('gameScreen').innerHTML = `
    <div class="panel">
      <h2>Complete</h2>
      <p>Accuracy: ${Math.round((correct/attempts)*100)}%</p>
    </div>
  `;
}

</script>

</body>
</html>
