<script>
function shuffle(arr){
  const a = [...arr];
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function formatTime(s){
  const m = Math.floor(s / 60).toString().padStart(2,'0');
  const sec = (s % 60).toString().padStart(2,'0');
  return `${m}:${sec}`;
}

function startTimer(el){
  let sec = 0;
  el.textContent = '00:00';
  return setInterval(() => {
    sec++;
    el.textContent = formatTime(sec);
  }, 1000);
}

function calcAccuracy(correct,total){
  return total ? Math.round((correct / total) * 100) : 0;
}

function buildHeader(title, sub){

    <div class="panel header">
      <div class="brand">

}

function todayStamp(){
  return new Date().toLocaleString();
}

function normalize(s){
  return String(s)
    .replace(/\s+/g,'')
    .replace(/\*+/g,'')
    .replace(/−/g,'-')
    .toLowerCase();
}

function makeKeypad(targetResolver, mode='equation'){
  const shell = document.createElement('div');
  shell.className = 'keypad-shell';

  const left = document.createElement('div');
  left.className = 'keypad-core';

  const right = document.createElement('div');
  right.className = 'keypad-ext';

  const core = ['1','2','3','4','5','6','7','8','9','0','.','⌫'];

  core.forEach(v => {
    const b = document.createElement('button');
    b.className = 'kbtn';
    b.type = 'button';
    b.textContent = v;
    b.onclick = () => press(v);
    left.appendChild(b);
  });

  let extras = [];
  if(mode === 'basic') extras = ['-','/','(',')','clear'];
  if(mode === 'slope') extras = ['-','/','clear'];
  if(mode === 'equation') extras = ['x','y','+','-','=','/','(',')','clear'];

  extras.forEach(v => {
    const b = document.createElement('button');
    b.className = 'kbtn dark';
    b.type = 'button';
    b.textContent = v;
    b.onclick = () => press(v);
    right.appendChild(b);
  });

  shell.append(left, right);

  function press(v){
    const el = targetResolver();
    if(!el) return;

    if(v === '⌫'){
      el.value = el.value.slice(0,-1);
      el.dispatchEvent(new Event('input'));
      return;
    }

    if(v === 'clear'){
      el.value = '';
      el.dispatchEvent(new Event('input'));
      return;
    }

    el.value += v;
    el.dispatchEvent(new Event('input'));
  }

  return shell;
}

function linePointsFromMB(m, b){
  const pts = [];
  for(let x = -5; x <= 5; x++){
    const y = m * x + b;
    if(Number.isInteger(y) && y >= -5 && y <= 5){
      pts.push([x, y]);
    }
  }
  return pts;
}

function drawGraphFromLine(m, b){
  const size = 280;
  const step = 24;
  const center = size / 2;
  const points = linePointsFromMB(m, b);

  let svg = `<div class="graph-box"><svg viewBox="0 0 ${size} ${size}" aria-label="coordinate grid">`;

  for(let i = 0; i <= size; i += step){
    svg += `<line x1="0" y1="${i}" x2="${size}" y2="${i}" stroke="#e8eef8" stroke-width="1"/>`;
    svg += `<line x1="${i}" y1="0" x2="${i}" y2="${size}" stroke="#e8eef8" stroke-width="1"/>`;
  }

  svg += `<line x1="0" y1="${center}" x2="${size}" y2="${center}" stroke="#111" stroke-width="1.8"/>`;
  svg += `<line x1="${center}" y1="0" x2="${center}" y2="${size}" stroke="#111" stroke-width="1.8"/>`;

  for(let n = -5; n <= 5; n++){
    const px = center + n * step;
    const py = center - n * step;
    if(n !== 0){
      svg += `<text x="${px-4}" y="${center+16}" font-size="10" fill="#334">${n}</text>`;
      svg += `<text x="${center+6}" y="${py+4}" font-size="10" fill="#334">${n}</text>`;
    }
  }

  const x1 = -5;
  const y1 = m * x1 + b;
  const x2 = 5;
  const y2 = m * x2 + b;

  const sx1 = center + x1 * step;
  const sy1 = center - y1 * step;
  const sx2 = center + x2 * step;
  const sy2 = center - y2 * step;

  svg += `<line x1="${sx1}" y1="${sy1}" x2="${sx2}" y2="${sy2}" stroke="#d43f3a" stroke-width="3"/>`;

  points.slice(0, 4).forEach(([x,y]) => {
    const px = center + x * step;
    const py = center - y * step;
    svg += `<circle cx="${px}" cy="${py}" r="4.5" fill="#d43f3a"/>`;
  });

  svg += `</svg></div>`;
  return svg;
}

function drawGraphFromPoints(points){
  const size = 280;
  const step = 24;
  const center = size / 2;
  let svg = `<div class="graph-box"><svg viewBox="0 0 ${size} ${size}" aria-label="coordinate grid">`;

  for(let i = 0; i <= size; i += step){
    svg += `<line x1="0" y1="${i}" x2="${size}" y2="${i}" stroke="#e8eef8" stroke-width="1"/>`;
    svg += `<line x1="${i}" y1="0" x2="${i}" y2="${size}" stroke="#e8eef8" stroke-width="1"/>`;
  }

  svg += `<line x1="0" y1="${center}" x2="${size}" y2="${center}" stroke="#111" stroke-width="1.8"/>`;
  svg += `<line x1="${center}" y1="0" x2="${center}" y2="${size}" stroke="#111" stroke-width="1.8"/>`;

  for(let n = -5; n <= 5; n++){
    const px = center + n * step;
    const py = center - n * step;
    if(n !== 0){
      svg += `<text x="${px-4}" y="${center+16}" font-size="10" fill="#334">${n}</text>`;
      svg += `<text x="${center+6}" y="${py+4}" font-size="10" fill="#334">${n}</text>`;
    }
  }

  if(points.length >= 2){
    const [a,b] = points;
    const m = (b[1] - a[1]) / (b[0] - a[0]);
    const intercept = a[1] - m * a[0];
    const x1 = -5;
    const y1 = m * x1 + intercept;
    const x2 = 5;
    const y2 = m * x2 + intercept;

    svg += `<line x1="${center + x1*step}" y1="${center - y1*step}" x2="${center + x2*step}" y2="${center - y2*step}" stroke="#d43f3a" stroke-width="3"/>`;
  }

  points.forEach(([x,y]) => {
    svg += `<circle cx="${center + x*step}" cy="${center - y*step}" r="5" fill="#d43f3a"/>`;
  });

  svg += `</svg></div>`;
  return svg;
}

function tableHtml(headers, rows){
  return `
    <div class="table-box">
      <table style="width:100%;border-collapse:collapse;background:#fff;color:#111;border-radius:12px;overflow:hidden">
        <thead>
          <tr>
            ${headers.map(h => `<th style="border:1px solid #d7e0f0;padding:10px;background:#eef3fb">${h}</th>`).join('')}
          </tr>
        </thead>
        <tbody>
          ${rows.map(r => `
            <tr>
              ${r.map(c => `<td style="border:1px solid #d7e0f0;padding:10px;text-align:center">${c}</td>`).join('')}
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function equationMatches(val, accepted){
  const n = normalize(val);
  return accepted.some(a => normalize(a) === n);
}

function startGame(){
  if(gameStarted) return;
  gameStarted = true;

  document.getElementById('studentNameOut').textContent =
    document.getElementById('studentName').value.trim() || 'Guest';
  document.getElementById('startedOut').textContent = todayStamp();
  document.getElementById('restartBtn').disabled = false;

  if(timerId) clearInterval(timerId);
  timerId = startTimer(document.getElementById('timerOut'));

  renderQuestion();
}

function renderQuestion(){
  const q = questions[index];

  if(!q){
    clearInterval(timerId);
    const stage = document.getElementById('stage');
    stage.innerHTML = `
      <div class="center" style="padding:30px 12px">
        <div class="qnum" style="margin:0 auto 12px;background:var(--good)">✓</div>
        <h2>Round Complete</h2>
        <p class="muted">Final accuracy: <strong>${calcAccuracy(correct,attempts)}%</strong> • Correct: <strong>${correct}</strong> / ${questions.length}</p>
        <div class="footer-controls" style="justify-content:center">
          <button class="btn" onclick="location.reload()">Play Again</button>
          <a class="btn secondary" href="../index.html">Back to Hub</a>
        </div>
      </div>
    `;
    document.getElementById('progressOut').textContent = `${questions.length}/${questions.length}`;
    document.getElementById('accuracyOut').textContent = `${calcAccuracy(correct,attempts)}%`;
    document.getElementById('progressBar').style.width = '100%';
    return;
  }

  document.getElementById('progressOut').textContent = `${index + 1}/${questions.length}`;
  document.getElementById('accuracyOut').textContent = `${calcAccuracy(correct,attempts)}%`;
  document.getElementById('progressBar').style.width = `${(index / questions.length) * 100}%`;

  const stage = document.getElementById('stage');

  if(q.type === 'mc'){

    body = `

            <input type="radio" name="choice" value="${c.idx}">

            <span>${c.text}</span>

        <button class="btn" id="submitBtn">Check Answer</button>

        </div>
      </div>
      <a class="btn secondary" href="../index.html">Exit</a>
    </div>

    <div class="prompt">${q.prompt}</div>
    ${body}
    <div class="feedback" id="feedback"></div>
  `;

  if(q.type === 'equation'){
    const input = document.getElementById('entryInput');
    activeInput = input;
    document.getElementById('keypadHost').appendChild(makeKeypad(() => activeInput, 'equation'));
    input.focus();
  }

  if(q.type === 'slopeEntry'){
    const input = document.getElementById('entryInput');
    activeInput = input;
    document.getElementById('keypadHost').appendChild(makeKeypad(() => activeInput, 'slope'));
    input.focus();
  }

  if(q.type === 'tableEquation'){
    const input = document.getElementById('entryInput');
    activeInput = input;
    document.getElementById('keypadHost').appendChild(makeKeypad(() => activeInput, 'equation'));
    input.focus();
  }

  if(q.type === 'tableSlope'){
    const input = document.getElementById('entryInput');
    activeInput = input;
    document.getElementById('keypadHost').appendChild(makeKeypad(() => activeInput, 'slope'));
    input.focus();
  }

  document.getElementById('submitBtn').onclick = checkAnswer;
}

function showFeedback(type, text){
  const fb = document.getElementById('feedback');
  fb.className = `feedback show ${type}`;
  fb.innerHTML = text;
}

function lockQuestionInputs(){
  document.querySelectorAll('input, select, button.kbtn').forEach(el => {
    el.disabled = true;
  });
  const submitBtn = document.getElementById('submitBtn');
  if(submitBtn) submitBtn.disabled = true;
}

function markChoicesMC(answerIdx){
  document.querySelectorAll('.choice').forEach(label => {
    const input = label.querySelector('input');
    if(Number(input.value) === answerIdx){
      label.classList.add('correct');
    } else if(input.checked){
      label.classList.add('incorrect');
    }
  });
}

function checkAnswer(){
  const q = questions[index];
  attempts++;
  let ok = false;

  if(q.type === 'mc'){
    const picked = document.querySelector('input[name="choice"]:checked');
    if(!picked) return showFeedback('bad','Select one answer first.');
    ok = Number(picked.value) === q.answer;
    markChoicesMC(q.answer);
  }

  if(q.type === 'equation'){
    ok = equationMatches(document.getElementById('entryInput').value, q.answer);
  }

  if(q.type === 'slopeEntry' || q.type === 'tableSlope'){
    ok = q.answer.some(a => normalize(a) === normalize(document.getElementById('entryInput').value));
  }

  if(q.type === 'tableEquation'){
    ok = equationMatches(document.getElementById('entryInput').value, q.answer);
  }

  document.getElementById('accuracyOut').textContent = `${calcAccuracy(correct,attempts)}%`;

  if(ok){
    correct++;
    document.getElementById('accuracyOut').textContent = `${calcAccuracy(correct,attempts)}%`;
    showFeedback('good', `<strong>Correct.</strong> ${q.explanation}`);
    lockQuestionInputs();
    setTimeout(() => {
      index++;
      renderQuestion();
    }, 1900);
  } else {
    showFeedback('bad', `<strong>Not yet.</strong> Hint: ${q.hint}<br><span class="muted">Revise your answer and try again.</span>`);
  }
}
</script>
</body>
