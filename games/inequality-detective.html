<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Inequality Detective — Algebra I OST Mastery</title>
<link rel="stylesheet" href="../styles.css">

<body>

<div class="wrap" id="app"></div>

<script>
// ---------- UTIL ----------
function shuffle(a){
  const arr=[...a];
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function norm(s){
  return String(s).replace(/\s+/g,'').toLowerCase();
}

// ---------- NUMBER LINE ----------
function numberLine(type, value){
  const min=0, max=10;
  const percent = (value/10)*100;

  let circle = (type==='open')
    ? `<circle cx="${percent}%" cy="50%" r="8" fill="white" stroke="black" stroke-width="2"/>`
    : `<circle cx="${percent}%" cy="50%" r="8" fill="black"/>`;

  let arrow = (type.includes('right'))
    ? `<line x1="${percent}%" y1="50%" x2="100%" y2="50%" stroke="red" stroke-width="4"/>`
    : `<line x1="0%" y1="50%" x2="${percent}%" y2="50%" stroke="red" stroke-width="4"/>`;

  return `
  <svg viewBox="0 0 300 60">
    <line x1="0" y1="50%" x2="100%" y2="50%" stroke="black" stroke-width="2"/>
    ${arrow}
    ${circle}
  </svg>`;
}

// ---------- CALCULATOR ----------
function createCalc(inputRef){
  const wrap=document.createElement('div');
  const keys=['7','8','9','4','5','6','1','2','3','0','-','⌫','clear'];

  keys.forEach(k=>{
    const b=document.createElement('button');
    b.textContent=k;
    b.className='kbtn';
    b.onclick=()=>{
      const el=inputRef();
      if(!el)return;

      if(k==='⌫'){el.value=el.value.slice(0,-1);return;}
      if(k==='clear'){el.value='';return;}
      el.value+=k;
    };
    wrap.appendChild(b);
  });

  return wrap;
}

// ---------- QUESTION BANK (30) ----------
const bank = [

{type:'mc',
q:`Solve: x + 3 > 7`,
choices:['x > 4','x < 4','x ≥ 4','x ≤ 4'],
a:0,
exp:'Subtract 3 from both sides'

{type:'input',
q:`Solve: x - 5 ≤ 10`,
a:['15'],
exp:'Add 5 to both sides'
},

{type:'mc',
q:`Solve: 2x > 8`,

a:0,
exp:'Divide by 2'
},

{type:'mc',
q:`Solve: -x > 5`,
choices:['x < -5','x > -5','x ≥ -5','x ≤ -5'],
a:0,

},

{type:'input',
q:`Solve: 3x ≤ 12`,

exp:'Divide by 3'
},

{type:'mc',
q:`Which graph matches x > 6? <br>${numberLine('open-right',6)}`,

'x > 6','x ≥ 6','x < 6','x ≤ 6'
],

exp:'Open circle = not included'
},

{type:'mc',

exp:'Closed circle = included'

{type:'input',
q:`Solve: x/2 > 3`,

exp:'Multiply both sides by 2'
},

{type:'mc',

],

},

{type:'input',
q:`Solve: 5 + x ≥ 9`,
a:['4'],
exp:'Subtract 5'
},

{type:'mc',
q:`Solve: x - 7 < 2`,

'x < 9','x > 9','x ≤ 9','x ≥ 9'
],
a:0,
exp:'Add 7'
},

{type:'input',
q:`Solve: 4x ≥ 20`,
a:['5'],
exp:'Divide by 4'
},

{type:'mc',
q:`Solve: -x ≤ 3`,
choices:[
'x ≥ -3','x ≤ -3','x > -3','x < -3'
],
a:0,
exp:'Flip inequality'
},

{type:'input',
q:`Solve: x/3 < 5`,
a:['15'],
exp:'Multiply by 3'
},

{type:'mc',
q:`Which represents ALL real numbers greater than 2?`,
choices:[
'x > 2','x ≥ 2','x < 2','x ≤ 2'
],
a:0,
exp:'Greater than excludes 2'
},

{type:'mc',
q:`Solve: 6x > 18`,
choices:[
'x > 3','x < 3','x ≥ 3','x ≤ 3'
],
a:0,
exp:'Divide by 6'
},

{type:'input',
q:`Solve: 2x + 4 < 10`,
a:['3'],
exp:'Subtract 4, divide by 2'
},

{type:'mc',
q:`Solve: -3x ≥ 9`,
choices:[
'x ≤ -3','x ≥ -3','x < -3','x > -3'
],
a:0,
exp:'Flip inequality'
},

{type:'input',
q:`Solve: x - 8 > -2`,
a:['6'],
exp:'Add 8'
},

{type:'mc',
q:`Solve: x + 2 ≤ 5`,

],

},

{type:'input',

},

{type:'mc',

{type:'mc',

},

{type:'input',

exp:'Divide by 5'
},

{type:'mc',
q:`Solve: -x ≥ 2`,

'x ≤ -2','x ≥ -2','x < -2','x > -2'
],

},

{type:'input',
q:`Solve: x + 9 > 12`,

},

{type:'mc',

],

{type:'input',

exp:'Divide by 9'
},

{type:'mc',
q:`Solve: -5x > -20`,

],

];

// ---------- GAME ----------
const questions = shuffle(bank);
let i=0, correct=0, attempts=0, activeInput=null;

const app=document.getElementById('app');

function render(){
  const q=questions[i];

  if(!q){
    app.innerHTML=`<h2>Complete!</h2>
    Accuracy: ${Math.round(correct/attempts*100)}%`;
    return;
  }

  let html=`<div class="panel">
  <h2>Question ${i+1}/30</h2>
  <div>${q.q}</div>`;

  if(q.type==='mc'){
    const choices=shuffle(q.choices.map((c,idx)=>({c,idx})));
    q._choices=choices;

    html+=choices.map(c=>`
    <label class="choice">
    <input type="radio" name="c" value="${c.idx}">
    ${c.c}
    </label>`).join('');

    html+=`<button id="submit">Submit</button>`;
  }

  if(q.type==='input'){
    html+=`
    <input id="input">
    <div id="calc"></div>
    <button id="submit">Submit</button>`;
  }

  html+=`<div id="feedback"></div></div>`;
  app.innerHTML=html;

  if(q.type==='input'){
    activeInput=document.getElementById('input');
    document.getElementById('calc')
      .appendChild(createCalc(()=>activeInput));
  }

  document.getElementById('submit').onclick=check;
}

function check(){
  const q=questions[i];
  attempts++;
  let ok=false;

  if(q.type==='mc'){
    const sel=document.querySelector('input[name="c"]:checked');
    if(!sel) return;
    ok=Number(sel.value)===q.a;
  }

  if(q.type==='input'){
    ok=q.a.some(a=>norm(a)===norm(activeInput.value));
  }

  const fb=document.getElementById('feedback');

  if(ok){
    correct++;
    fb.innerHTML="Correct! "+q.exp;
    setTimeout(()=>{i++;render();},1500);
  }else{
    fb.innerHTML="Try again: "+q.exp;
  }
}

render();
</script>

</body>
</html>
